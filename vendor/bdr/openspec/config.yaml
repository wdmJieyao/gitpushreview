schema: spec-driven

# Per-artifact rules (optional)
context: |
  Tech stack:
  - Markdown + YAML frontmatter: skills (SKILL.md), commands, agents
  - JSON: .cursor-plugin, .claude-plugin, .codex-plugin, gemini-extension.json
  - Bash: hooks (session-start), scripts/, tests/
  - JavaScript ESM: .opencode/plugins/bdr.js (Node built-ins only, zero npm deps)
