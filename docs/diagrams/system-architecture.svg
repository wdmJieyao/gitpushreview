<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1020" viewBox="0 0 1600 1020" role="img" aria-labelledby="title desc">
  <title id="title">GitPushReview 系统架构图</title>
  <desc id="desc">展示使用入口、输入边界、审核编排层、静态分析层、规则与知识层、模型复审层、决策与输出层之间关系的架构图。</desc>
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="55%" stop-color="#0c1730"/>
      <stop offset="100%" stop-color="#132544"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#020611" flood-opacity="0.35"/>
    </filter>
    <style>
      .bg { fill: url(#bg-gradient); }
      .lane { fill: rgba(12, 21, 38, 0.86); stroke: #263b63; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .lane-title { font: 700 24px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #eef4ff; }
      .box { fill: #16243d; stroke: #5f769d; stroke-width: 2; rx: 14; filter: url(#shadow); }
      .box-accent { fill: #122e52; stroke: #64a7ff; stroke-width: 2.5; rx: 14; filter: url(#shadow); }
      .box-warm { fill: #382515; stroke: #f0a65c; stroke-width: 2.5; rx: 14; filter: url(#shadow); }
      .box-green { fill: #173225; stroke: #68d59a; stroke-width: 2.5; rx: 14; filter: url(#shadow); }
      .box-title { font: 700 20px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #f7fbff; }
      .box-text { font: 500 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #bfd0ea; }
      .note { font: 600 15px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #9db2d1; }
      .arrow { stroke: #9dc4ff; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .soft-arrow { stroke: #6f89b0; stroke-width: 2; fill: none; marker-end: url(#arrowhead-soft); }
      .headline { font: 700 30px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #ffffff; }
      .subline { font: 500 16px "PingFang SC", "Microsoft YaHei", Arial, sans-serif; fill: #9fb5d5; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#9dc4ff"/>
    </marker>
    <marker id="arrowhead-soft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#6f89b0"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1020"/>
  <text class="headline" x="40" y="34">GitPushReview System Architecture</text>
  <text class="subline" x="40" y="62">Staged input, static routing, candidate-bounded model review, local decision enforcement</text>

  <rect class="lane" x="36" y="92" width="260" height="220"/>
  <text class="lane-title" x="64" y="132">使用入口</text>
  <rect class="box" x="64" y="158" width="204" height="46"/>
  <text class="box-title" x="92" y="188">开发者</text>
  <rect class="box" x="64" y="220" width="204" height="46"/>
  <text class="box-title" x="92" y="250">git commit</text>
  <rect class="box" x="64" y="282" width="204" height="46"/>
  <text class="box-title" x="92" y="312">gitpushreview check --staged</text>

  <rect class="lane" x="324" y="92" width="260" height="220"/>
  <text class="lane-title" x="352" y="132">输入边界</text>
  <rect class="box-accent" x="352" y="158" width="204" height="78"/>
  <text class="box-title" x="380" y="188">Git 暂存区快照</text>
  <text class="box-text" x="380" y="212">staged diff</text>
  <text class="box-text" x="380" y="232">staged files / staged blobs</text>
  <rect class="box" x="352" y="250" width="204" height="62"/>
  <text class="box-title" x="380" y="280">工作区文件</text>
  <text class="box-text" x="380" y="302">仅 explain &lt;file&gt; 时读取</text>

  <rect class="lane" x="612" y="92" width="304" height="220"/>
  <text class="lane-title" x="640" y="132">审核编排层</text>
  <rect class="box-accent" x="640" y="158" width="248" height="56"/>
  <text class="box-title" x="668" y="190">CLI / Hook</text>
  <text class="box-text" x="668" y="210">src/cli.js + src/hook.js</text>
  <rect class="box-accent" x="640" y="228" width="248" height="56"/>
  <text class="box-title" x="668" y="260">Review Runner</text>
  <text class="box-text" x="668" y="280">src/review/runner.js</text>

  <rect class="lane" x="944" y="92" width="308" height="220"/>
  <text class="lane-title" x="972" y="132">规则与知识层</text>
  <rect class="box" x="972" y="158" width="252" height="46"/>
  <text class="box-title" x="1000" y="188">rules-index.md / policy.md</text>
  <rect class="box" x="972" y="220" width="252" height="46"/>
  <text class="box-title" x="1000" y="250">default / project / diy 规则</text>
  <rect class="box-warm" x="972" y="282" width="252" height="46"/>
  <text class="box-title" x="1000" y="312">vendor/bdr</text>

  <rect class="lane" x="36" y="300" width="760" height="414"/>
  <text class="lane-title" x="64" y="340">静态分析层</text>
  <rect class="box-green" x="64" y="372" width="216" height="88"/>
  <text class="box-title" x="92" y="404">Capability Context</text>
  <text class="box-text" x="92" y="430">路径 / 扩展名 / 内容信号</text>
  <text class="box-text" x="92" y="452">输出 capabilities / labels</text>
  <rect class="box-green" x="304" y="372" width="216" height="88"/>
  <text class="box-title" x="332" y="404">Deterministic Gates</text>
  <text class="box-text" x="332" y="430">SQL / MQ / Java Inline SQL</text>
  <text class="box-text" x="332" y="452">只补高置信证据</text>
  <rect class="box-green" x="544" y="372" width="224" height="88"/>
  <text class="box-title" x="572" y="404">Rule Router</text>
  <text class="box-text" x="572" y="430">paths + capabilities</text>
  <text class="box-text" x="572" y="452">+ requiredCapabilities</text>
  <rect class="box-green" x="184" y="510" width="220" height="88"/>
  <text class="box-title" x="212" y="542">Rule Evidence</text>
  <text class="box-text" x="212" y="568">evidencePatterns 命中</text>
  <text class="box-text" x="212" y="590">只补静态线索，不拦截</text>
  <rect class="box-accent" x="430" y="510" width="250" height="108"/>
  <text class="box-title" x="458" y="542">候选规则集</text>
  <text class="box-text" x="458" y="568">candidateRuleIds</text>
  <text class="box-text" x="458" y="590">candidateSummary</text>
  <text class="box-text" x="458" y="612">reasons / duplicates / counts</text>
  <text class="note" x="64" y="664">静态层职责：收敛候选规则、补证据，不直接决定最终拦截</text>

  <rect class="lane" x="824" y="300" width="392" height="414"/>
  <text class="lane-title" x="852" y="340">模型复审层</text>
  <rect class="box-warm" x="852" y="372" width="336" height="88"/>
  <text class="box-title" x="880" y="404">Prompt Builder</text>
  <text class="box-text" x="880" y="430">组装 diff / 候选规则 / 静态证据 / BDR</text>
  <text class="box-text" x="880" y="452">只把相关规则交给模型，不做全量盲审</text>
  <rect class="box-warm" x="852" y="486" width="336" height="56"/>
  <text class="box-title" x="880" y="518">OpenAI-compatible Model</text>
  <rect class="box-warm" x="852" y="562" width="336" height="64"/>
  <text class="box-title" x="880" y="594">Result Parser + Candidate Filter</text>
  <text class="box-text" x="880" y="616">候选集外 findings -> rejectedFindings</text>
  <text class="note" x="852" y="664">模型层职责：在候选范围内复审，不允许越界 findings 直接生效</text>

  <rect class="lane" x="1244" y="300" width="320" height="414"/>
  <text class="lane-title" x="1272" y="340">决策与输出层</text>
  <rect class="box-accent" x="1272" y="390" width="264" height="88"/>
  <text class="box-title" x="1300" y="422">Decision Engine</text>
  <text class="box-text" x="1300" y="448">PASS / SOFT_BLOCK / HARD_BLOCK</text>
  <text class="box-text" x="1300" y="470">按得分和 blocking 汇总</text>
  <rect class="box-accent" x="1272" y="520" width="264" height="88"/>
  <text class="box-title" x="1300" y="552">Report / JSON / Exit Code</text>
  <text class="box-text" x="1300" y="578">中文报告、诊断、pre-commit 返回码</text>

  <path class="arrow" d="M 268 243 L 352 243"/>
  <path class="arrow" d="M 556 197 L 640 197"/>
  <path class="arrow" d="M 764 256 L 764 330"/>
  <path class="arrow" d="M 454 236 L 454 372"/>
  <path class="arrow" d="M 454 312 L 454 372"/>
  <path class="soft-arrow" d="M 1098 266 L 1098 372"/>
  <path class="soft-arrow" d="M 1098 328 L 1098 372"/>
  <path class="arrow" d="M 280 416 L 304 416"/>
  <path class="arrow" d="M 520 416 L 544 416"/>
  <path class="arrow" d="M 656 460 L 656 510"/>
  <path class="arrow" d="M 294 460 L 294 510"/>
  <path class="arrow" d="M 680 564 L 852 564"/>
  <path class="arrow" d="M 1188 514 L 1188 594"/>
  <path class="arrow" d="M 1188 594 L 1272 594"/>
  <path class="arrow" d="M 1404 478 L 1404 520"/>

  <text class="note" x="64" y="912">关键边界 1：check --staged 只读暂存区，不读未暂存工作区</text>
  <text class="note" x="64" y="944">关键边界 2：静态路由决定候选范围，模型复审决定最终问题</text>
  <text class="note" x="64" y="976">关键边界 3：候选集外 findings 只进 rejectedFindings，不参与最终拦截</text>
</svg>
